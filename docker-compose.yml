# ONT clean-build go-live stack — G3 clean-slate signet READ + WRITE path.
# See docs/operate/G3_CLEAN_SLATE_VPS.md for the teardown -> rebuild -> boot/read/write-smoke runbook.
#
#   private-signet-miner --RPC--> bitcoind(private signet) --RPC--> indexer (node ingest, chain-gated)
#                                      ^                              --file store--> resolver (read) --> web (display)
#                                      +---- publisher (/broadcast) <--- signed raw from off-box wallet
#
# The indexer writes confirmed anchors to a durable file store (ONT_STORE=file under ONT_STORE_DIR); the resolver
# reads the SAME dir (shared volume), so a restart resumes without re-ingesting (go-live G2). The publisher is the
# write entry: it assembles UNSIGNED txs and relays already-signed raws to bitcoind (it never signs, never reads the
# store). The miner bootstraps a private signet with mature coinbase funds for the off-box signing wallet, then mines
# at a low cadence so claims confirm. NOT mainnet, NOT a B3 data-availability path. Secrets, host binds, challenge,
# miner address, and image pins are operator config in .env (copy .env.example). `npm run check:deploy` gates this file.
services:
  # Fresh private-signet Bitcoin Core. The indexer's only chain source. Image is operator-pinned (BITCOIND_IMAGE) —
  # use a Bitcoin Core >= 25 signet-capable build you trust. The custom challenge makes this our private chain,
  # so there is no public-signet IBD; the miner sidecar produces blocks and funds the off-box signing wallet.
  bitcoind:
    image: ${BITCOIND_IMAGE:-btcpayserver/bitcoin:28.1}
    # The btcpayserver/bitcoin entrypoint runs `exec gosu bitcoin "$@"` only when argv[0] is the binary
    # (bitcoind/bitcoin-cli/...); any other argv[0] falls to `exec "$@"`, so a leading `-signet` becomes
    # `exec -signet` and crash-loops. Name the binary first; the flags follow.
    command:
      - bitcoind
      - -signet
      - -signetchallenge=${ONT_SIGNET_CHALLENGE:-51}
      - -dnsseed=0
      - -server
      - -txindex
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcport=38332
      - -rpcuser=${ONT_RPC_USER:-ontrpc}
      - -rpcpassword=${ONT_RPC_PASSWORD:?set ONT_RPC_PASSWORD in .env}
    volumes:
      - bitcoind_data:/data/.bitcoin
    restart: unless-stopped
    healthcheck:
      # Operator-validate the bitcoin-cli path for your chosen image; getblockchaininfo proves the RPC is live.
      test: ["CMD-SHELL", "bitcoin-cli -signet -rpcuser=${ONT_RPC_USER:-ontrpc} -rpcpassword=${ONT_RPC_PASSWORD} getblockchaininfo >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 30s

  # Private-signet block producer. It adapts the proven legacy flow onto compose:
  # contrib/signet/miner + fast grinder, 110 bootstrap blocks for coinbase maturity, then low-rate ongoing mining.
  # Coinbase pays the off-box funding/signing wallet address; the publisher still never holds keys.
  private-signet-miner:
    build:
      context: .
      dockerfile: docker/private-signet-miner.Dockerfile
      args:
        BITCOIND_IMAGE: ${BITCOIND_IMAGE:-btcpayserver/bitcoin:28.1}
        BITCOIN_SOURCE_VERSION: ${ONT_SIGNET_MINER_BITCOIN_VERSION:-28.1}
    env_file:
      - .env
    environment:
      ONT_RPC_URL: http://bitcoind:38332
      ONT_RPC_USER: ${ONT_RPC_USER:-ontrpc}
      ONT_RPC_PASSWORD: ${ONT_RPC_PASSWORD:?set ONT_RPC_PASSWORD in .env}
      ONT_SIGNET_CHALLENGE: ${ONT_SIGNET_CHALLENGE:-51}
      ONT_SIGNET_MINER_ADDRESS: ${ONT_SIGNET_MINER_ADDRESS:?set ONT_SIGNET_MINER_ADDRESS in .env}
      ONT_SIGNET_BOOTSTRAP_BLOCKS: "${ONT_SIGNET_BOOTSTRAP_BLOCKS:-110}"
      ONT_SIGNET_MINE_INTERVAL_SECONDS: "${ONT_SIGNET_MINE_INTERVAL_SECONDS:-45}"
      ONT_SIGNET_MINE_NBITS: "${ONT_SIGNET_MINE_NBITS:-1e0377ae}"
    depends_on:
      bitcoind:
        condition: service_healthy
    restart: unless-stopped

  # Live ingest daemon (apps/indexer/src/main.ts). ONT_SOURCE=node runs the @ont/node-live chain gate against
  # ONT_CHAIN before any poll — a mispointed/missing RPC fails closed here, before the loop starts.
  indexer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["indexer"]
    env_file:
      - .env
    environment:
      ONT_SOURCE: node
      ONT_CHAIN: signet
      ONT_RPC_URL: http://bitcoind:38332
      ONT_RPC_USER: ${ONT_RPC_USER:-ontrpc}
      ONT_RPC_PASSWORD: ${ONT_RPC_PASSWORD:?set ONT_RPC_PASSWORD in .env}
      ONT_STORE: file
      ONT_STORE_DIR: /app/.data
      # A' fixture-file enforcement is opt-in. Default stays off so the plain RootAnchor read path remains active
      # unless the operator has generated /app/.data/batch-material.json before the anchor is ingested.
      ONT_ENFORCEMENT: ${ONT_ENFORCEMENT:-off}
      ONT_BATCH_MATERIAL_FILE: ${ONT_BATCH_MATERIAL_FILE:-/app/.data/batch-material.json}
      INDEXER_POLL_MS: "${INDEXER_POLL_MS:-10000}"
      # Private-signet client checkpoint: the indexer uses the same signet-scoped launch checkpoint to
      # backfill headers.json for resolver-served header ranges.
      ONT_LAUNCH_CHECKPOINT_HEIGHT: "${ONT_LAUNCH_CHECKPOINT_HEIGHT:-0}"
      ONT_LAUNCH_CHECKPOINT_HASH: "${ONT_LAUNCH_CHECKPOINT_HASH:-00000008819873e925422c1ff0f99f7cc9bbb232af63a077a480a3633bee1ef6}"
      ONT_LAUNCH_CHECKPOINT_BITS: "${ONT_LAUNCH_CHECKPOINT_BITS:-0x1e0377ae}"
      ONT_LAUNCH_CHECKPOINT_TIME: "${ONT_LAUNCH_CHECKPOINT_TIME:-1598918400}"
      ONT_LAUNCH_CHECKPOINT_EPOCH_START: "${ONT_LAUNCH_CHECKPOINT_EPOCH_START:-1598918400}"
      ONT_LAUNCH_CHECKPOINT_WORK: "${ONT_LAUNCH_CHECKPOINT_WORK:-49d414}"
    volumes:
      - ont_data:/app/.data
    depends_on:
      bitcoind:
        condition: service_healthy
    restart: unless-stopped

  # Read service (apps/resolver/src/index.ts). Reads the indexer's durable confirmed-anchors store (same ONT_STORE_DIR,
  # shared volume) and serves GET /tx/:txid + /health on PORT. No resolver->indexer network edge.
  resolver:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["resolver"]
    env_file:
      - .env
    environment:
      PORT: "4174"
      ONT_STORE: file
      ONT_STORE_DIR: /app/.data
    volumes:
      - ont_data:/app/.data
    depends_on:
      indexer:
        condition: service_started
    ports:
      - "${ONT_RESOLVER_BIND:-127.0.0.1}:4174:4174"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4174/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Display surface (apps/web/src/index.ts). Reads its tx source from the resolver over HTTP (ONT_RESOLVER_URL) and
  # serves the explorer + /health on PORT. Read/display only — no keys, no signing.
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["web"]
    env_file:
      - .env
    environment:
      PORT: "4175"
      ONT_RESOLVER_URL: http://resolver:4174
      ONT_HEADER_PROVIDER: "${ONT_HEADER_PROVIDER:-resolver}"
      ONT_LAUNCH_CHECKPOINT_HEIGHT: "${ONT_LAUNCH_CHECKPOINT_HEIGHT:-0}"
      ONT_LAUNCH_CHECKPOINT_HASH: "${ONT_LAUNCH_CHECKPOINT_HASH:-00000008819873e925422c1ff0f99f7cc9bbb232af63a077a480a3633bee1ef6}"
      ONT_LAUNCH_CHECKPOINT_BITS: "${ONT_LAUNCH_CHECKPOINT_BITS:-0x1e0377ae}"
      ONT_LAUNCH_CHECKPOINT_TIME: "${ONT_LAUNCH_CHECKPOINT_TIME:-1598918400}"
      ONT_LAUNCH_CHECKPOINT_EPOCH_START: "${ONT_LAUNCH_CHECKPOINT_EPOCH_START:-1598918400}"
      ONT_LAUNCH_CHECKPOINT_WORK: "${ONT_LAUNCH_CHECKPOINT_WORK:-49d414}"
    depends_on:
      resolver:
        condition: service_healthy
    ports:
      - "${ONT_WEB_BIND:-127.0.0.1}:4175:4175"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4175/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Write entry (apps/publisher/src/index.ts). The publisher NEVER signs and NEVER reads the anchor store
  # (no ont_data volume): /assemble/* return an UNSIGNED tx for off-box (B5 wallet) signing, and /broadcast is
  # the ONLY route that touches the chain — it relays an already-signed legacy raw to bitcoind via sendrawtransaction.
  # ONT_SOURCE=node runs the same @ont/node-live chain gate as the indexer BEFORE the server listens, so a
  # mispointed/missing RPC or a chain mismatch fails closed at startup. Bound to 127.0.0.1 by default (override
  # ONT_PUBLISHER_BIND); the operator drives the write-smoke from the box. See the runbook §4c.
  publisher:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["publisher"]
    env_file:
      - .env
    environment:
      PORT: "4176"
      ONT_SOURCE: node
      ONT_CHAIN: signet
      ONT_RPC_URL: http://bitcoind:38332
      ONT_RPC_USER: ${ONT_RPC_USER:-ontrpc}
      ONT_RPC_PASSWORD: ${ONT_RPC_PASSWORD:?set ONT_RPC_PASSWORD in .env}
    depends_on:
      bitcoind:
        condition: service_healthy
    ports:
      - "${ONT_PUBLISHER_BIND:-127.0.0.1}:4176:4176"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4176/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ont_data:
  bitcoind_data:
