name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and package tests
        run: npm test

      - name: Private signet auto-miner script smoke
        run: npm run test:private-signet-auto-mine-script

  # The website fixture smoke needs a Playwright browser download that has been
  # flaky/hanging on CI runners. It is a product-UI check, not protocol
  # verification, so it runs as a separate NON-BLOCKING job: it never gates the
  # protocol CI from going green, and step timeouts keep it from hanging.
  browser-smoke:
    name: Browser Fixture Smoke (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        timeout-minutes: 6
        run: npm run playwright:install

      - name: Browser fixture smoke
        timeout-minutes: 4
        run: npm run test:e2e:fixture-web
