name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and package tests
        run: npm test

      - name: Private signet auto-miner script smoke
        run: npm run test:private-signet-auto-mine-script

  mobile:
    name: Mobile Typecheck + Crypto
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      # The crypto cross-check runs each *.mts against the real engine SOURCE using
      # the repo-root tsx (checks/run.mjs resolves ../../node_modules/.bin/tsx) and
      # imports from ../../packages/*. Without the root workspace installed, every
      # check group fails to even launch — so install root deps before mobile's.
      - name: Install workspace dependencies (engine + tsx)
        run: npm ci

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Mobile typecheck
        run: npm run typecheck
        working-directory: mobile

      - name: Mobile offline crypto cross-check (byte-identical to the engine)
        run: npm run check:crypto
        working-directory: mobile

  # The website fixture smoke (product-UI check). Now GATING: a non-blocking,
  # silently-stale UX test reads as coverage while verifying nothing. The Chromium
  # binary is cached so a slow download can't flake the gate; step timeouts keep a
  # cache-miss download from hanging the run.
  browser-smoke:
    name: Browser Fixture Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        timeout-minutes: 10
        run: npm run playwright:install

      - name: Browser fixture smoke
        timeout-minutes: 4
        run: npm run test:e2e:fixture-web
