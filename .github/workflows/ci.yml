name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and package tests
        run: npm test

      - name: Private signet auto-miner script smoke
        run: npm run test:private-signet-auto-mine-script

  mobile:
    name: Mobile Typecheck + Crypto
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Mobile typecheck
        run: npm run typecheck
        working-directory: mobile

      - name: Mobile offline crypto cross-check (byte-identical to the engine)
        run: npm run check:crypto
        working-directory: mobile

  # The website fixture smoke (product-UI check). Now GATING: a non-blocking,
  # silently-stale UX test reads as coverage while verifying nothing. Step
  # timeouts keep the Playwright browser download from hanging the run.
  browser-smoke:
    name: Browser Fixture Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        timeout-minutes: 6
        run: npm run playwright:install

      - name: Browser fixture smoke
        timeout-minutes: 4
        run: npm run test:e2e:fixture-web
